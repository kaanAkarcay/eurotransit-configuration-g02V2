apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eurotransit.fullname" . }}-inventory
  labels:
    app.kubernetes.io/name: inventory
    app.kubernetes.io/instance: {{ .Release.Name }}

spec:
  replicas: {{ .Values.inventory.replicaCount }}

  selector:
    matchLabels:
      app.kubernetes.io/name: inventory
      app.kubernetes.io/instance: {{ .Release.Name }}

  template:
    metadata:
      labels:
        app.kubernetes.io/name: inventory
        app.kubernetes.io/instance: {{ .Release.Name }}

    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: inventory

          image: "{{ .Values.inventory.image.repository }}:{{ .Values.inventory.image.tag }}"
          imagePullPolicy: {{ .Values.inventory.image.pullPolicy }}

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 15
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "postgres"

            - name: SPRING_R2DBC_URL
              value: "r2dbc:postgresql://inventory-db-rw.eurotransit.svc.cluster.local:5432/inventory_db"

            - name: SPRING_R2DBC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: inventory-db-app
                  key: username

            - name: SPRING_R2DBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventory-db-app
                  key: password

            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "eurotransit-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"

            - name: KEYCLOAK_ISSUER_URI
              value: "{{ .Values.keycloak.issuerUri }}"

            - name: INVENTORY_JWT_AUDIENCE
              value: "{{ .Values.inventory.security.jwt.audience }}"
