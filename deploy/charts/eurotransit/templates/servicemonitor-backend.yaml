{{- $frontendStrategy := include "eurotransit.deploymentStrategy" (dict "root" . "service" "frontend") | trim -}}
{{- $catalogStrategy := include "eurotransit.deploymentStrategy" (dict "root" . "service" "catalog") | trim -}}
{{- $ordersStrategy := include "eurotransit.deploymentStrategy" (dict "root" . "service" "orders") | trim -}}
{{- $progressiveEnabled := or
      (ne $frontendStrategy "standard")
      (ne $catalogStrategy "standard")
      (ne $ordersStrategy "standard")
      .Values.blueGreen.inventory.enabled
      .Values.blueGreen.payments.enabled -}}
{{- range $svc := list "catalog" "orders" "inventory" "payments" "notifications" "payment-gateway-sim" }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "eurotransit.fullname" $ }}-{{ $svc }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ $svc }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - {{ $.Release.Namespace }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $svc }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  {{- if $progressiveEnabled }}
  podTargetLabels:
    - app.kubernetes.io/track
  {{- end }}
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
      scrapeTimeout: 5s
{{- end }}
