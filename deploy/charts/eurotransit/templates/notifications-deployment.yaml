apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eurotransit.fullname" . }}-notifications
  labels:
    app.kubernetes.io/name: notifications
    app.kubernetes.io/instance: {{ .Release.Name }}

spec:
  replicas: {{ .Values.notifications.replicaCount }}

  selector:
    matchLabels:
      app.kubernetes.io/name: notifications
      app.kubernetes.io/instance: {{ .Release.Name }}

  template:
    metadata:
      labels:
        app.kubernetes.io/name: notifications
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        kubectl.kubernetes.io/restartedAt: "{{ .Values.notifications.restartedAt }}"

    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: notifications

          image: "{{ .Values.notifications.image.repository }}:{{ .Values.notifications.image.tag }}"
          imagePullPolicy: {{ .Values.notifications.image.pullPolicy }}

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          resources:
            {{- toYaml .Values.notifications.resources | nindent 12 }}

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 15
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24

          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "eurotransit-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"

            - name: ZIPKIN_ENDPOINT
              value: "http://{{ include "eurotransit.fullname" . }}-zipkin:9411/api/v2/spans"
            # Secret created out of band (kubectl create secret generic
            # notifications-smtp --from-literal=username=... --from-literal=password=...)
            # - a Gmail App Password, not a real account password, so it's
            # never committed here.
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: notifications-smtp
                  key: username
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notifications-smtp
                  key: password
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: notifications-smtp
                  key: username
