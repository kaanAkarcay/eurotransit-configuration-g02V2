apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eurotransit.fullname" . }}-payments
  labels:
    app.kubernetes.io/name: payments
    app.kubernetes.io/instance: {{ .Release.Name }}

spec:
  replicas: {{ .Values.payments.replicaCount }}

  selector:
    matchLabels:
      app.kubernetes.io/name: payments
      app.kubernetes.io/instance: {{ .Release.Name }}

  template:
    metadata:
      labels:
        app.kubernetes.io/name: payments
        app.kubernetes.io/instance: {{ .Release.Name }}

    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: payments

          image: "{{ .Values.payments.image.repository }}:{{ .Values.payments.image.tag }}"
          imagePullPolicy: {{ .Values.payments.image.pullPolicy }}

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 15
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "postgres"

            - name: DB_HOST
              value: "{{ .Release.Name }}-cluster-rw"

            - name: DB_PORT
              value: "5432"

            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: "{{ .Release.Name }}-cluster-app"
                  key: dbname

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: "{{ .Release.Name }}-cluster-app"
                  key: username

            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: "{{ .Release.Name }}-cluster-app"
                  key: password
