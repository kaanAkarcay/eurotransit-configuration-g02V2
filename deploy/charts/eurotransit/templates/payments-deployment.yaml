apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eurotransit.fullname" . }}-payments
  labels:
    app.kubernetes.io/name: payments
    app.kubernetes.io/instance: {{ .Release.Name }}

spec:
  replicas: {{ .Values.payments.replicaCount }}

  selector:
    matchLabels:
      app.kubernetes.io/name: payments
      app.kubernetes.io/instance: {{ .Release.Name }}

  template:
    metadata:
      labels:
        app.kubernetes.io/name: payments
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        kubectl.kubernetes.io/restartedAt: "{{ .Values.payments.restartedAt }}"

    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: payments

          image: "{{ .Values.payments.image.repository }}:{{ .Values.payments.image.tag }}"
          imagePullPolicy: {{ .Values.payments.image.pullPolicy }}

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 15
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "postgres"

            - name: SPRING_R2DBC_URL
              value: "r2dbc:postgresql://payments-db-rw.eurotransit.svc.cluster.local:5432/payments_db"

            - name: SPRING_R2DBC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: payments-db-app
                  key: username

            - name: SPRING_R2DBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payments-db-app
                  key: password

            - name: KEYCLOAK_ISSUER_URI
              value: "{{ .Values.keycloak.issuerUri }}"

            - name: KEYCLOAK_JWK_SET_URI
              value: "{{ .Values.keycloak.jwkSetUri }}"

            - name: PAYMENTS_JWT_AUDIENCE
              value: "{{ .Values.payments.security.jwt.audience }}"

            {{ with .Values.payments.gateway }}
            - name: GATEWAY_URL
              value: "{{ .url }}"
            {{- end }}

            {{ with .Values.payments.springApplicationJson }}
            - name: SPRING_APPLICATION_JSON
              value: {{ . | toJson | quote }}
            {{- end }}
