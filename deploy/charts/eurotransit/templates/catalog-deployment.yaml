apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eurotransit.fullname" . }}-catalog
  labels:
    app.kubernetes.io/name: catalog
    app.kubernetes.io/instance: {{ .Release.Name }}

spec:
  replicas: {{ .Values.catalog.replicaCount }}

  selector:
    matchLabels:
      app.kubernetes.io/name: catalog
      app.kubernetes.io/instance: {{ .Release.Name }}

  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        # Forces a real rollout when CI pushes a new "latest" image - the
        # tag string itself never changes, so without this Kubernetes has
        # no signal to restart already-running pods.
        kubectl.kubernetes.io/restartedAt: "{{ .Values.catalog.restartedAt }}"

    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: catalog

          image: "{{ .Values.catalog.image.repository }}:{{ .Values.catalog.image.tag }}"
          imagePullPolicy: {{ .Values.catalog.image.pullPolicy }}

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 15
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "postgres"

            - name: SPRING_R2DBC_URL
              value: "r2dbc:postgresql://catalog-db-rw.eurotransit.svc.cluster.local:5432/catalog_db"

            - name: SPRING_R2DBC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: catalog-db-app
                  key: username

            - name: SPRING_R2DBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: catalog-db-app
                  key: password
