apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eurotransit.fullname" . }}-orders
  labels:
    app.kubernetes.io/name: orders
    app.kubernetes.io/instance: {{ .Release.Name }}

spec:
  replicas: {{ .Values.orders.replicaCount }}

  selector:
    matchLabels:
      app.kubernetes.io/name: orders
      app.kubernetes.io/instance: {{ .Release.Name }}

  template:
    metadata:
      labels:
        app.kubernetes.io/name: orders
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        kubectl.kubernetes.io/restartedAt: "{{ .Values.orders.restartedAt }}"

    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: orders

          image: "{{ .Values.orders.image.repository }}:{{ .Values.orders.image.tag }}"
          imagePullPolicy: {{ .Values.orders.image.pullPolicy }}

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 15
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "postgres"

            - name: DB_HOST
              value: "orders-db-rw.eurotransit.svc.cluster.local"

            - name: DB_PORT
              value: "5432"

            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: orders-db-app
                  key: dbname

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: orders-db-app
                  key: username

            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: orders-db-app
                  key: password

            - name: KAFKA_BROKERS
              value: "eurotransit-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"

            - name: PAYMENTS_HOST
              value: "{{ .Release.Name }}-payments"

            - name: INVENTORY_HOST
              value: "{{ .Release.Name }}-inventory"

            - name: KEYCLOAK_ISSUER_URI
              value: "{{ .Values.keycloak.issuerUri }}"

            - name: KEYCLOAK_JWK_SET_URI
              value: "{{ .Values.keycloak.jwkSetUri }}"

            - name: ORDERS_JWT_AUDIENCE
              value: "{{ .Values.orders.security.jwt.audience }}"

            - name: INVENTORY_SERVICE_TOKEN_ENABLED
              value: "{{ .Values.orders.security.serviceToken.inventory.enabled }}"

            {{- if .Values.orders.security.serviceToken.inventory.enabled }}
            - name: KEYCLOAK_TOKEN_URI
              value: "{{ .Values.keycloak.tokenUri }}"

            - name: ORDERS_SERVICE_CLIENT_ID
              value: "{{ .Values.orders.security.serviceToken.inventory.clientId }}"

            - name: ORDERS_SERVICE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.orders.security.serviceToken.inventory.clientSecret.secretName }}"
                  key: "{{ .Values.orders.security.serviceToken.inventory.clientSecret.secretKey }}"
            {{- end }}
