{{- if .Values.inventory.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "eurotransit.fullname" . }}-inventory
  labels:
    app.kubernetes.io/name: inventory
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "eurotransit.fullname" . }}-inventory
  minReplicas: {{ .Values.inventory.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.inventory.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.inventory.autoscaling.targetCPUUtilizationPercentage }}
  {{- with .Values.inventory.autoscaling.behavior }}
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
