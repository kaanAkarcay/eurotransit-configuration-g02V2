apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-gateway-sim
  labels:
    app.kubernetes.io/name: payment-gateway-sim
    app.kubernetes.io/instance: {{ .Release.Name }}

spec:
  replicas: {{ .Values.paymentGatewaySim.replicaCount }}

  selector:
    matchLabels:
      app.kubernetes.io/name: payment-gateway-sim
      app.kubernetes.io/instance: {{ .Release.Name }}

  template:
    metadata:
      labels:
        app.kubernetes.io/name: payment-gateway-sim
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        kubectl.kubernetes.io/restartedAt: "{{ .Values.paymentGatewaySim.restartedAt }}"

    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: payment-gateway-sim

          image: "{{ .Values.paymentGatewaySim.image.repository }}:{{ .Values.paymentGatewaySim.image.tag }}"
          imagePullPolicy: {{ .Values.paymentGatewaySim.image.pullPolicy }}

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 15
            failureThreshold: 3

          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24

          {{- with .Values.paymentGatewaySim.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
