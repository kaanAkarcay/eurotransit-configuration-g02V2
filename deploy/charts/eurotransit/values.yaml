namespace: eurotransit
# Exactly one mode is selected for each service that supports both progressive
# strategies. The safe default keeps the existing Kubernetes Deployment path.
deploymentStrategies:
  frontend: blueGreen
  catalog: canary
  orders: canary
progressiveDelivery:
  # Keep the previous ReplicaSet available for a fast rollback after promotion.
  scaleDownDelaySeconds: 1800
  # Conservative wall-clock budget:
  # 4 Canary stages * 5m + 20s minReady + 10m scheduling/provider margin.
  # Argo Rollouts 1.9 excludes Analysis/Pause steps from deadline estimation,
  # but this larger budget also protects Blue/Green and future controller
  # behavior from a nominal 10-minute timeout.
  progressDeadlineSeconds: 2100
  progressDeadlineAbort: true
  # Require sustained readiness before a candidate is considered available.
  minReadySeconds: 20
  revisionHistoryLimit: 3
  rollbackWindowRevisions: 2
  automatedAnalysis:
    # Every progressive workload is fail-closed. Catalog and Orders use
    # candidate-revision Prometheus signals. Blue/Green previews are exercised
    # by AnalysisRun web probes before automatic promotion.
    services:
      frontend:
        enabled: true
      catalog:
        enabled: true
      orders:
        enabled: true
      inventory:
        enabled: true
      payments:
        enabled: true
    prometheusAddress: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
    # One analysis stage covers a complete five-minute observation window.
    # HTTP volume/errors/latency and restarts are evaluated once at the end;
    # readiness is sampled every interval throughout the same window.
    duration: 5m
    interval: 15s
    # Critical safety signals start after two scrape intervals and are sampled
    # throughout the stage. Their range window is long enough for counter
    # increase() while final volume/latency still use the complete duration.
    safetyWarmup: 30s
    safetyQueryWindow: 1m
    canaryWeights:
      - 10
      - 25
      - 50
      - 100
    # Generic backend threshold (Catalog). Orders uses direct candidate
    # traffic and the lower service-specific threshold below.
    minimumRequests: 15
    # Orders Rollout traffic runs directly against the candidate at 2 RPM.
    # Five committed orders per five-minute stage leaves one full scrape
    # interval of scheduling tolerance while limiting each 25m run to 50 sagas.
    ordersMinimumRequests: 5
    maximumP95LatencySeconds: 0.5
    # Fail on the first bad, inconclusive, or provider-error measurement.
    failureLimit: 0
    inconclusiveLimit: 0
    consecutiveErrorLimit: 2
    # Added to the longest automated strategy when validating the Rollout
    # progress deadline. Covers scheduling, ReplicaSet readiness and provider
    # delay outside the nominal analysis windows.
    progressDeadlineSafetyMarginSeconds: 600
    # The old active ReplicaSet must outlive post-promotion analysis plus this
    # explicit allowance for query/provider delay and operator reaction time.
    postPromotionSafetyMarginSeconds: 600
  blueGreen:
    # 20 minutes: greater than 5m analysis + 10m safety margin.
    scaleDownDelaySeconds: 1200
canary:
  frontend:
    host: eurotransit-demo2.spaincentral.cloudapp.azure.com
    path: /
    initialWeight: 10
  catalog:
    host: eurotransit-demo2.spaincentral.cloudapp.azure.com
    path: /api/v1/catalog
    initialWeight: 10
  orders:
    host: eurotransit-demo2.spaincentral.cloudapp.azure.com
    path: /api/v1/orders
    initialWeight: 10
# Inventory and Payments support Blue/Green only, so a boolean is sufficient.
# Frontend, Catalog and Orders select Blue/Green through deploymentStrategies.
blueGreen:
  inventory:
    enabled: true
  payments:
    enabled: true
frontend:
  replicaCount: 1
  image:
    repository: eurotransitdemo2registry.azurecr.io/eurotransit/frontend
    tag: latest
    # Progressive workloads are pinned to an immutable registry digest. CI
    # replaces this only after pushing and independently verifying the image.
    digest: "sha256:e5a6cd551aa352f392406eeee142054c7b64491dd4b2e44cc4b1745d003f626c"
    pullPolicy: Always
  # CI updates this for pod-template traceability and standard rollouts.
  restartedAt: "2026-07-17T11:30:31Z-b751fb1a1eb76126495349a34e2e467d036c9d80"
  # Static nginx, tiny footprint. Set explicitly - an unset resources block
  # leaves the pod BestEffort, invisible to the scheduler's placement math,
  # which is exactly what let every app service pile onto one already-full
  # node instead of spreading out (see docs/ai-logs.md 2026-07-14).
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 80
catalog:
  replicaCount: 1
  image:
    repository: eurotransitdemo2registry.azurecr.io/eurotransit/catalog
    tag: latest
    # Progressive workloads are pinned to an immutable registry digest. CI
    # replaces this only after pushing and independently verifying the image.
    digest: "sha256:e6bbc5dda01ca62d9420af657211de347e3e335139e4171fe7209cdcfdf165b5"
    pullPolicy: Always
  # CI updates this for pod-template traceability and standard rollouts.
  restartedAt: "2026-07-17T11:32:24Z-b751fb1a1eb76126495349a34e2e467d036c9d80"
  # Re-measured 2026-07-15: actual usage steady at ~264Mi, so 384Mi/768Mi left
  # ~3x headroom unused on capacity-starved nodes. Trimmed to ~1.9x actual.
  resources:
    requests:
      cpu: 100m
      memory: 300Mi
    limits:
      cpu: 500m
      memory: 500Mi
  service:
    type: ClusterIP
    port: 8080
orders:
  replicaCount: 1
  image:
    repository: eurotransitdemo2registry.azurecr.io/eurotransit/orders
    tag: latest
    # Progressive workloads are pinned to an immutable registry digest. CI
    # replaces this only after pushing and independently verifying the image.
    digest: "sha256:ce807d99df0d34dcab52bece71350b855b69ac271a15ece2e16a2e5ab9090fd7"
    pullPolicy: Always
  restartedAt: "2026-07-17T00:27:19Z-a72add1a77787efb99c89066b4e924a197cfcb2d"
  # Re-measured 2026-07-15: actual usage steady at ~315Mi (highest of the 5,
  # matches it running 4 Kafka consumers plus the outbox poller on top of its
  # own HTTP handler). Trimmed from 400Mi/800Mi, kept more headroom than its
  # siblings for the same reason.
  resources:
    requests:
      cpu: 150m
      memory: 380Mi
    limits:
      cpu: 600m
      memory: 600Mi
  pdb:
    enabled: true
    minAvailable: 1
  service:
    type: ClusterIP
    port: 8080
  # Rendered into SPRING_APPLICATION_JSON so ArgoCD owns the runtime policy for
  # Orders' synchronous downstream calls. Keep instance names aligned with the
  # application code: inventory-client and payments-client.
  springApplicationJson:
    app:
      backpressure:
        orders:
          enabled: true
          max-concurrent-requests: 20
          retry-after-seconds: 1
      inventory:
        # WebClient responseTimeout on the Orders->Inventory call. Enforced by
        # the client's Netty connector (InventoryClient), which is what lets the
        # inventory-client circuit breaker record a hung call as a failure.
        timeout: 2s
        connection-pool:
          name: orders-inventory
          max-connections: 20
          pending-acquire-max-count: 50
          pending-acquire-timeout: 500ms
      payments:
        # Must exceed Payments' own 5s gateway timeout (payments app.gateway.timeout)
        # so Orders doesn't abort a call Payments is still working on.
        timeout: 6s
        connection-pool:
          name: orders-payments
          max-connections: 20
          pending-acquire-max-count: 50
          pending-acquire-timeout: 500ms
    resilience4j:
      timelimiter:
        instances:
          inventory-client:
            # The Orders clients use this property as the Reactor Netty
            # responseTimeout source; it is not an annotation-only TimeLimiter.
            timeout-duration: 2s
          payments-client:
            # Must exceed Payments' own 5s gateway timeout so Orders does not
            # abort a call Payments is still working on.
            timeout-duration: 6s
      bulkhead:
        instances:
          inventory-client:
            max-concurrent-calls: 20
            max-wait-duration: 0ms
          payments-client:
            max-concurrent-calls: 20
            max-wait-duration: 0ms
      circuitbreaker:
        instances:
          inventory-client:
            register-health-indicator: true
            sliding-window-size: 10
            minimum-number-of-calls: 5
            failure-rate-threshold: 50
            wait-duration-in-open-state: 10s
            permitted-number-of-calls-in-half-open-state: 3
          payments-client:
            register-health-indicator: true
            sliding-window-size: 10
            minimum-number-of-calls: 5
            failure-rate-threshold: 50
            wait-duration-in-open-state: 10s
            permitted-number-of-calls-in-half-open-state: 3
      retry:
        instances:
          inventory-client:
            max-attempts: 3
            wait-duration: 500ms
            enable-exponential-backoff: true
            exponential-backoff-multiplier: 2
            enable-randomized-wait: true
            randomized-wait-factor: 0.5
          payments-client:
            max-attempts: 3
            wait-duration: 500ms
            enable-exponential-backoff: true
            exponential-backoff-multiplier: 2
            enable-randomized-wait: true
            randomized-wait-factor: 0.5
  security:
    jwt:
      audience: orders
    serviceToken:
      inventory:
        # One orders-service token for all outbound sync calls (Inventory +
        # Payments) - see PaymentClient.kt/InventoryClient.kt, both gated by
        # this same toggle. Enabling this (plus the SERVICE_TOKEN_ENABLED env
        # var rename and the payments-audience realm scope) is what actually
        # fixes the Orders -> Payments 401.
        enabled: true
        clientId: orders-service
        # Must match the confidential client secret configured in Keycloak.
        # Store the real value as a Kubernetes Secret/SealedSecret, not here.
        clientSecret:
          secretName: orders-service-client
          secretKey: client-secret
inventory:
  replicaCount: 1
  image:
    repository: eurotransitdemo2registry.azurecr.io/eurotransit/inventory
    tag: latest
    # Progressive workloads are pinned to an immutable registry digest. CI
    # replaces this only after pushing and independently verifying the image.
    digest: "sha256:cd7418c37754c31c7745074e407dcecd97d67c9fc2b5b541ed93a7280ca08227"
    pullPolicy: Always
  restartedAt: "2026-07-17T00:26:44Z-a72add1a77787efb99c89066b4e924a197cfcb2d"
  # Re-measured 2026-07-15: actual usage steady at ~294Mi, so 400Mi/800Mi left
  # ~2.7x headroom unused on capacity-starved nodes. Trimmed to ~1.9x actual.
  # CPU untouched - the HPA's targetCPUUtilizationPercentage needs a stable
  # baseline to compute against.
  resources:
    requests:
      cpu: 250m
      memory: 340Mi
    limits:
      cpu: "1"
      memory: 550Mi
  pdb:
    enabled: true
    minAvailable: 1
  service:
    type: ClusterIP
    port: 8080
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 60
        policies:
          - type: Pods
            value: 1
            periodSeconds: 60
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Pods
            value: 1
            periodSeconds: 120
  security:
    jwt:
      audience: inventory
payments:
  replicaCount: 1
  image:
    repository: eurotransitdemo2registry.azurecr.io/eurotransit/payments
    tag: latest
    # Progressive workloads are pinned to an immutable registry digest. CI
    # replaces this only after pushing and independently verifying the image.
    digest: "sha256:2462baf3abde3c1c75da92cb28f59dd6bdcb9a79a1da2d46c96391270bef8f55"
    pullPolicy: Always
  restartedAt: "2026-07-17T00:26:30Z-a72add1a77787efb99c89066b4e924a197cfcb2d"
  # Re-measured 2026-07-15: actual usage steady at ~251Mi, so 384Mi/768Mi left
  # ~3x headroom unused on capacity-starved nodes. Trimmed to ~1.9x actual.
  resources:
    requests:
      cpu: 100m
      memory: 300Mi
    limits:
      cpu: 500m
      memory: 480Mi
  pdb:
    enabled: true
    minAvailable: 1
  service:
    type: ClusterIP
    port: 8080
  gateway:
    url: http://payment-gateway-sim:8080
  # Rendered into SPRING_APPLICATION_JSON. This keeps the Payments -> gateway
  # circuit-breaker policy in GitOps instead of only in the image defaults.
  springApplicationJson:
    app:
      gateway:
        timeout: 5s
        connection-pool:
          name: payments-gateway
          max-connections: 20
          pending-acquire-max-count: 50
          pending-acquire-timeout: 500ms
    resilience4j:
      bulkhead:
        instances:
          payment-gateway:
            max-concurrent-calls: 20
            max-wait-duration: 0ms
      circuitbreaker:
        instances:
          payment-gateway:
            sliding-window-type: COUNT_BASED
            sliding-window-size: 10
            minimum-number-of-calls: 5
            failure-rate-threshold: 50
            slow-call-duration-threshold: 2s
            slow-call-rate-threshold: 50
            wait-duration-in-open-state: 10s
            permitted-number-of-calls-in-half-open-state: 3
            automatic-transition-from-open-to-half-open-enabled: true
            register-health-indicator: true
  security:
    jwt:
      audience: payments
# Key deliberately matches the service/directory name (dashed): CI's rollout
# step bumps `."<service>".restartedAt` and must land on this block.
payment-gateway-sim:
  replicaCount: 1
  image:
    repository: eurotransitdemo2registry.azurecr.io/eurotransit/payment-gateway-sim
    tag: latest
    pullPolicy: Always
  restartedAt: "2026-07-17T00:26:16Z-a72add1a77787efb99c89066b4e924a197cfcb2d"
  # No resources declared previously - BestEffort QoS, invisible to the
  # scheduler's placement math despite steady real usage (~216Mi). Found
  # during the 2026-07-15 end-to-end memory audit; same root cause as every
  # other fix this session.
  resources:
    requests:
      cpu: 50m
      memory: 260Mi
    limits:
      cpu: 250m
      memory: 420Mi
  service:
    type: ClusterIP
    port: 8080
  stripe:
    # false = LocalChargeGateway (declines above 500.00), no secret needed.
    # Flip to true only after the payment-gateway-sim-stripe Secret exists in
    # the cluster (key: stripe-secret-key) — with it enabled and no key the
    # pod fails fast at startup by design.
    enabled: false
    paymentMethod: pm_card_visa
notifications:
  replicaCount: 1
  image:
    repository: eurotransitdemo2registry.azurecr.io/eurotransit/notifications
    tag: latest
    pullPolicy: Always
  restartedAt: "2026-07-17T00:26:05Z-a72add1a77787efb99c89066b4e924a197cfcb2d"
  # Re-measured 2026-07-15: actual usage steady at ~219Mi, so 320Mi/640Mi left
  # ~2.9x headroom unused on capacity-starved nodes. Trimmed to ~1.9x actual.
  resources:
    requests:
      cpu: 100m
      memory: 260Mi
    limits:
      cpu: 500m
      memory: 420Mi
  service:
    type: ClusterIP
    port: 8080
zipkin:
  # Distributed tracing backend for the money path (Frontend -> Orders ->
  # Inventory/Payments, plus the order-placed/inventory-reserved/
  # payment-authorized/order-confirmed Kafka hops). zipkin-slim skips the
  # Elasticsearch/Cassandra/Kafka storage backends we don't need - single
  # pod, in-memory span storage, fine for this project's traffic and node
  # capacity.
  enabled: true
  replicaCount: 1
  image:
    repository: openzipkin/zipkin-slim
    tag: "3.4"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 384Mi
  service:
    type: ClusterIP
    port: 9411
imagePullSecrets:
  - name: acr-secret
keycloak:
  issuerUri: https://eurotransit-demo2.spaincentral.cloudapp.azure.com/auth/realms/eurotransit
  tokenUri: http://eurotransit-keycloak-service:8080/auth/realms/eurotransit/protocol/openid-connect/token
  jwkSetUri: http://eurotransit-keycloak-service:8080/auth/realms/eurotransit/protocol/openid-connect/certs
cluster:
  # Disabled: leftover bundled single-shared-Postgres subchart from before the
  # per-service CNPG migration. Nothing references it anymore - all 5 backend
  # services use their own dedicated <service>-db CNPG cluster instead. Left
  # running it was silently holding 3 full PVCs + 3 pods for nothing, and
  # actively fighting our attempt to free capacity for orders-db/Kafka during
  # a real Azure vCPU quota shortage (polandcentral regional quota exhausted).
  enabled: false
  type: postgresql
  mode: standalone
  version:
    postgresql: "16"
  cluster:
    enableSuperuserAccess: true
    initdb:
      database: eurotransitdb
  monitoring:
    enabled: false
  instances: 1
  annotations:
    helm.sh/resource-policy: keep
  backups:
    enabled: false
