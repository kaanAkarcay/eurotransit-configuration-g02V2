namespace: eurotransit

# Exactly one mode is selected for each service that supports both progressive
# strategies. The safe default keeps the existing Kubernetes Deployment path.
deploymentStrategies:
  frontend: standard
  catalog: standard
  orders: standard

progressiveDelivery:
  # Keep the previous ReplicaSet available for a fast rollback after promotion.
  scaleDownDelaySeconds: 1800
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 3
  rollbackWindowRevisions: 2

canary:
  frontend:
    host: g02.cpo2026.it
    path: /
    initialWeight: 10
  catalog:
    host: g02.cpo2026.it
    path: /api/v1/catalog
    initialWeight: 10
  orders:
    host: g02.cpo2026.it
    path: /api/v1/orders
    initialWeight: 10

# Inventory and Payments support Blue/Green only, so a boolean is sufficient.
# Frontend, Catalog and Orders select Blue/Green through deploymentStrategies.
blueGreen:
  inventory:
    enabled: false
  payments:
    enabled: false

frontend:
  replicaCount: 1
  image:
    repository: lab02clusterregistry.azurecr.io/eurotransit/frontend
    tag: latest
    # Stable baseline verified from the running Lab02cluster pod on 2026-07-14.
    # CI replaces this with the registry digest of each tested main build.
    digest: sha256:f6f574f804a0aca5d5856eb4686700966ef7810175ef1672b08004c4c5d9f21f
    # Always, not IfNotPresent: tag is mutable ("latest"), matching the same
    # reasoning already applied to the 5 backend services.
    pullPolicy: Always
  # Bumped by CI on every push to frontend/** (see .github/workflows/ci.yaml
  # in the application repo) so the pod template hash changes and
  # Kubernetes actually rolls out the new image.
  restartedAt: "unset"
  service:
    type: ClusterIP
    port: 80
catalog:
  replicaCount: 1
  image:
    repository: lab02clusterregistry.azurecr.io/eurotransit/catalog
    tag: latest
    # Stable baseline verified from the running Lab02cluster pod on 2026-07-14.
    # CI replaces this with the registry digest of each tested main build.
    digest: sha256:83bbb96376e6bbd30d4094847f992bfc7feca39e30ea3e748e23bcd8e6a9a7e8
    # Always, not IfNotPresent: tag is mutable now (CI always pushes "latest"),
    # so a cached local image under that name must never be trusted as current.
    pullPolicy: Always
  # Bumped by CI on every push to main (see .github/workflows/ci.yaml) so the
  # pod template hash changes and Kubernetes actually rolls out the new
  # image - "latest" alone never changes the Deployment spec, so nothing
  # would otherwise trigger a restart.
  restartedAt: "2026-07-12T16:50:05Z-manual-fix"
  service:
    type: ClusterIP
    port: 8080
orders:
  replicaCount: 1
  image:
    repository: lab02clusterregistry.azurecr.io/eurotransit/orders
    tag: latest
    # Stable baseline verified from the running Lab02cluster pod on 2026-07-14.
    # CI replaces this with the registry digest of each tested main build.
    digest: sha256:dcb05b71e576a08fbb5470e141441b53a3666fb8d83e9ab3b0dec4e3e24d50ea
    pullPolicy: Always
  restartedAt: "2026-07-12T16:50:05Z-manual-fix"
  service:
    type: ClusterIP
    port: 8080
  # Rendered into SPRING_APPLICATION_JSON so ArgoCD owns the runtime policy for
  # Orders' synchronous downstream calls. Keep instance names aligned with the
  # application code: inventory-client and payments-client.
  springApplicationJson:
    app:
      inventory:
        connection-pool:
          name: orders-inventory
          max-connections: 20
          pending-acquire-max-count: 50
          pending-acquire-timeout: 500ms
      payments:
        connection-pool:
          name: orders-payments
          max-connections: 20
          pending-acquire-max-count: 50
          pending-acquire-timeout: 500ms
    resilience4j:
      bulkhead:
        instances:
          inventory-client:
            max-concurrent-calls: 20
            max-wait-duration: 0ms
          payments-client:
            max-concurrent-calls: 20
            max-wait-duration: 0ms
      circuitbreaker:
        instances:
          inventory-client:
            register-health-indicator: true
            sliding-window-size: 10
            minimum-number-of-calls: 5
            failure-rate-threshold: 50
            wait-duration-in-open-state: 10s
            permitted-number-of-calls-in-half-open-state: 3
          payments-client:
            register-health-indicator: true
            sliding-window-size: 10
            minimum-number-of-calls: 5
            failure-rate-threshold: 50
            wait-duration-in-open-state: 10s
            permitted-number-of-calls-in-half-open-state: 3
      timelimiter:
        instances:
          inventory-client:
            timeout-duration: 2s
          payments-client:
            timeout-duration: 6s
      retry:
        instances:
          inventory-client:
            max-attempts: 3
            wait-duration: 500ms
            enable-exponential-backoff: true
            exponential-backoff-multiplier: 2
            enable-randomized-wait: true
            randomized-wait-factor: 0.5
          payments-client:
            max-attempts: 3
            wait-duration: 500ms
            enable-exponential-backoff: true
            exponential-backoff-multiplier: 2
            enable-randomized-wait: true
            randomized-wait-factor: 0.5
  security:
    jwt:
      audience: orders
    serviceToken:
      inventory:
        enabled: false
        # Must match the confidential client secret configured in Keycloak.
        # Store the real value as a Kubernetes Secret/SealedSecret, not here.
        clientSecret:
          secretName: orders-service-client
          secretKey: client-secret
inventory:
  replicaCount: 1
  image:
    repository: lab02clusterregistry.azurecr.io/eurotransit/inventory
    tag: latest
    # Stable baseline verified from the running Lab02cluster pod on 2026-07-14.
    # CI replaces this with the registry digest of each tested main build.
    digest: sha256:965f2030fe9e0c4c9f2cd4e551e2f8bf973047fa095ca6b55300afe7de9362e8
    pullPolicy: Always
  restartedAt: "2026-07-12T16:50:05Z-manual-fix"
  service:
    type: ClusterIP
    port: 8080
  security:
    jwt:
      audience: inventory
payments:
  replicaCount: 1
  image:
    repository: lab02clusterregistry.azurecr.io/eurotransit/payments
    tag: latest
    # Stable baseline verified from the running Lab02cluster pod on 2026-07-14.
    # CI replaces this with the registry digest of each tested main build.
    digest: sha256:83432f3870b4f22cb4759f85a439c407ba0088c526bfc9ce50ed26ef00f499fe
    pullPolicy: Always
  restartedAt: "2026-07-12T16:50:05Z-manual-fix"
  service:
    type: ClusterIP
    port: 8080
  gateway:
    url: http://payment-gateway-sim:8080
  # Rendered into SPRING_APPLICATION_JSON. This keeps the Payments -> gateway
  # circuit-breaker policy in GitOps instead of only in the image defaults.
  springApplicationJson:
    app:
      gateway:
        timeout: 5s
        connection-pool:
          name: payments-gateway
          max-connections: 20
          pending-acquire-max-count: 50
          pending-acquire-timeout: 500ms
    resilience4j:
      bulkhead:
        instances:
          payment-gateway:
            max-concurrent-calls: 20
            max-wait-duration: 0ms
      circuitbreaker:
        instances:
          payment-gateway:
            sliding-window-type: COUNT_BASED
            sliding-window-size: 10
            minimum-number-of-calls: 5
            failure-rate-threshold: 50
            slow-call-duration-threshold: 2s
            slow-call-rate-threshold: 50
            wait-duration-in-open-state: 10s
            permitted-number-of-calls-in-half-open-state: 3
            automatic-transition-from-open-to-half-open-enabled: true
            register-health-indicator: true
  security:
    jwt:
      audience: payments
# Key deliberately matches the service/directory name (dashed): CI's rollout
# step bumps `."<service>".restartedAt` and must land on this block.
payment-gateway-sim:
  replicaCount: 1
  image:
    repository: lab02clusterregistry.azurecr.io/eurotransit/payment-gateway-sim
    tag: latest
    pullPolicy: Always
  restartedAt: "2026-07-12T16:50:05Z-manual-fix"
  service:
    type: ClusterIP
    port: 8080
  stripe:
    # false = LocalChargeGateway (declines above 500.00), no secret needed.
    # Flip to true only after the payment-gateway-sim-stripe Secret exists in
    # the cluster (key: stripe-secret-key) — with it enabled and no key the
    # pod fails fast at startup by design.
    enabled: false
    paymentMethod: pm_card_visa
notifications:
  replicaCount: 1
  image:
    repository: lab02clusterregistry.azurecr.io/eurotransit/notifications
    tag: latest
    pullPolicy: Always
  restartedAt: "2026-07-12T16:50:05Z-manual-fix"
  service:
    type: ClusterIP
    port: 8080
imagePullSecrets:
  - name: acr-secret
keycloak:
  issuerUri: https://g02.cpo2026.it/auth/realms/eurotransit
  tokenUri: http://eurotransit-keycloak-service:8080/auth/realms/eurotransit/protocol/openid-connect/token
  jwkSetUri: http://eurotransit-keycloak-service:8080/auth/realms/eurotransit/protocol/openid-connect/certs
cluster:
  # Disabled: leftover bundled single-shared-Postgres subchart from before the
  # per-service CNPG migration. Nothing references it anymore - all 5 backend
  # services use their own dedicated <service>-db CNPG cluster instead. Left
  # running it was silently holding 3 full PVCs + 3 pods for nothing, and
  # actively fighting our attempt to free capacity for orders-db/Kafka during
  # a real Azure vCPU quota shortage (polandcentral regional quota exhausted).
  enabled: false
  type: postgresql
  mode: standalone
  version:
    postgresql: "16"
  cluster:
    enableSuperuserAccess: true
    initdb:
      database: eurotransitdb
  monitoring:
    enabled: false
  instances: 1
  annotations:
    helm.sh/resource-policy: keep
  backups:
    enabled: false
