namespace: eurotransit
frontend:
  replicaCount: 1
  image:
    repository: lab02clusterregistry.azurecr.io/eurotransit/frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
catalog:
  replicaCount: 1
  image:
    repository: lab02clusterregistry.azurecr.io/eurotransit/catalog
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
orders:
  replicaCount: 1
  image:
    repository: lab02clusterregistry.azurecr.io/eurotransit/orders
    tag: 0314bd4
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
canary:
  orders:
    enabled: false
    host: g02.cpo2026.it
    stableWeight: 90
    canaryWeight: 10
    stableServiceName: ""
    canaryServiceName: eurotransit-orders-canary
inventory:
  replicaCount: 1
  image:
    repository: lab02clusterregistry.azurecr.io/eurotransit/inventory
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
payments:
  replicaCount: 1
  image:
    repository: lab02clusterregistry.azurecr.io/eurotransit/payments
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
notifications:
  replicaCount: 1
  image:
    repository: lab02clusterregistry.azurecr.io/eurotransit/notifications
    tag: 4a878ec
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
imagePullSecrets:
  - name: acr-secret
cluster:
  enabled: true
  type: postgresql
  mode: standalone
  version:
    postgresql: "16"
  cluster:
    enableSuperuserAccess: true
    initdb:
      database: eurotransitdb
  monitoring:
    enabled: false
  instances: 1
  annotations:
    helm.sh/resource-policy: keep
  backups:
    enabled: false
