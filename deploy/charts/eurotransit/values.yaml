namespace: eurotransit
# Exactly one mode is selected for each service that supports both progressive
# strategies. The safe default keeps the existing Kubernetes Deployment path.
deploymentStrategies:
  frontend: standard
  catalog: standard
  orders: standard
progressiveDelivery:
  # Keep the previous ReplicaSet available for a fast rollback after promotion.
  scaleDownDelaySeconds: 1800
  progressDeadlineSeconds: 600
  # Require sustained readiness before a candidate is considered available.
  minReadySeconds: 20
  revisionHistoryLimit: 3
  rollbackWindowRevisions: 2
canary:
  frontend:
    host: g02.cpo2026.it
    path: /
    initialWeight: 10
  catalog:
    host: g02.cpo2026.it
    path: /api/v1/catalog
    initialWeight: 10
  orders:
    host: g02.cpo2026.it
    path: /api/v1/orders
    initialWeight: 10
# Inventory and Payments support Blue/Green only, so a boolean is sufficient.
# Frontend, Catalog and Orders select Blue/Green through deploymentStrategies.
blueGreen:
  inventory:
    enabled: false
  payments:
    enabled: false
frontend:
  replicaCount: 1
  image:
    repository: lab02clusterregistry.azurecr.io/eurotransit/frontend
    tag: latest
    # Empty by default: standard mode resolves "latest" via restartedAt, same as
    # today's CI/CD flow. requireProgressiveDigest already fails the render if
    # this service is switched to canary/blueGreen without a real digest here -
    # populate it only at that point, not as a standing default.
    digest: ""
    pullPolicy: Always
  # CI updates this for pod-template traceability and standard rollouts.
  restartedAt: "unset"
  # Static nginx, tiny footprint. Set explicitly - an unset resources block
  # leaves the pod BestEffort, invisible to the scheduler's placement math,
  # which is exactly what let every app service pile onto one already-full
  # node instead of spreading out (see docs/ai-logs.md 2026-07-14).
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 80
catalog:
  replicaCount: 1
  image:
    repository: lab02clusterregistry.azurecr.io/eurotransit/catalog
    tag: latest
    # Empty by default: standard mode resolves "latest" via restartedAt, same as
    # today's CI/CD flow. requireProgressiveDigest already fails the render if
    # this service is switched to canary/blueGreen without a real digest here -
    # populate it only at that point, not as a standing default.
    digest: "sha256:83bbb96376e6bbd30d4094847f992bfc7feca39e30ea3e748e23bcd8e6a9a7e8"
    pullPolicy: Always
  # CI updates this for pod-template traceability and standard rollouts.
  restartedAt: "2026-07-12T17:07:48Z-0d700ea85074077403745c197b085d2342d563ee"
  # Re-measured 2026-07-15: actual usage steady at ~264Mi, so 384Mi/768Mi left
  # ~3x headroom unused on capacity-starved nodes. Trimmed to ~1.9x actual.
  resources:
    requests:
      cpu: 100m
      memory: 300Mi
    limits:
      cpu: 500m
      memory: 500Mi
  service:
    type: ClusterIP
    port: 8080
orders:
  replicaCount: 1
  image:
    repository: lab02clusterregistry.azurecr.io/eurotransit/orders
    tag: latest
    # Empty by default: standard mode resolves "latest" via restartedAt, same as
    # today's CI/CD flow. requireProgressiveDigest already fails the render if
    # this service is switched to canary/blueGreen without a real digest here -
    # populate it only at that point, not as a standing default.
    #
    # CI's "update GitOps image and commit" step unconditionally set this to
    # sha256:b2842f9b... on 2026-07-16, regardless of deploymentStrategies.orders
    # being "standard" - the same bug the canary PR review already fixed once,
    # reintroduced via ci.yaml's yq step instead of a static default. That
    # digest also turned out to not durably exist in ACR (kubelet: manifest
    # "not found" after 5+ retries over 4 minutes) - a second, separate
    # registry/CI reliability issue. Reset to empty here; ci.yaml's digest step
    # needs to check deploymentStrategies.orders before setting this field.
    digest: ""
    pullPolicy: Always
  restartedAt: "2026-07-16T03:10:20Z-612d8cfa76514432eccada58831e6cfb11e27b89"
  # Re-measured 2026-07-15: actual usage steady at ~315Mi (highest of the 5,
  # matches it running 4 Kafka consumers plus the outbox poller on top of its
  # own HTTP handler). Trimmed from 400Mi/800Mi, kept more headroom than its
  # siblings for the same reason.
  resources:
    requests:
      cpu: 150m
      memory: 380Mi
    limits:
      cpu: 600m
      memory: 600Mi
  service:
    type: ClusterIP
    port: 8080
  # Rendered into SPRING_APPLICATION_JSON so ArgoCD owns the runtime policy for
  # Orders' synchronous downstream calls. Keep instance names aligned with the
  # application code: inventory-client and payments-client.
  springApplicationJson:
    app:
      inventory:
        # WebClient responseTimeout on the Orders->Inventory call. Enforced by
        # the client's Netty connector (InventoryClient), which is what lets the
        # inventory-client circuit breaker record a hung call as a failure.
        timeout: 2s
        connection-pool:
          name: orders-inventory
          max-connections: 20
          pending-acquire-max-count: 50
          pending-acquire-timeout: 500ms
      payments:
        # Must exceed Payments' own 5s gateway timeout (payments app.gateway.timeout)
        # so Orders doesn't abort a call Payments is still working on.
        timeout: 6s
        connection-pool:
          name: orders-payments
          max-connections: 20
          pending-acquire-max-count: 50
          pending-acquire-timeout: 500ms
    resilience4j:
      bulkhead:
        instances:
          inventory-client:
            max-concurrent-calls: 20
            max-wait-duration: 0ms
          payments-client:
            max-concurrent-calls: 20
            max-wait-duration: 0ms
      circuitbreaker:
        instances:
          inventory-client:
            register-health-indicator: true
            sliding-window-size: 10
            minimum-number-of-calls: 5
            failure-rate-threshold: 50
            wait-duration-in-open-state: 10s
            permitted-number-of-calls-in-half-open-state: 3
          payments-client:
            register-health-indicator: true
            sliding-window-size: 10
            minimum-number-of-calls: 5
            failure-rate-threshold: 50
            wait-duration-in-open-state: 10s
            permitted-number-of-calls-in-half-open-state: 3
      retry:
        instances:
          inventory-client:
            max-attempts: 3
            wait-duration: 500ms
            enable-exponential-backoff: true
            exponential-backoff-multiplier: 2
            enable-randomized-wait: true
            randomized-wait-factor: 0.5
          payments-client:
            max-attempts: 3
            wait-duration: 500ms
            enable-exponential-backoff: true
            exponential-backoff-multiplier: 2
            enable-randomized-wait: true
            randomized-wait-factor: 0.5
  security:
    jwt:
      audience: orders
    serviceToken:
      inventory:
        # One orders-service token for all outbound sync calls (Inventory +
        # Payments) - see PaymentClient.kt/InventoryClient.kt, both gated by
        # this same toggle. Enabling this (plus the SERVICE_TOKEN_ENABLED env
        # var rename and the payments-audience realm scope) is what actually
        # fixes the Orders -> Payments 401.
        enabled: true
        clientId: orders-service
        # Must match the confidential client secret configured in Keycloak.
        # Store the real value as a Kubernetes Secret/SealedSecret, not here.
        clientSecret:
          secretName: orders-service-client
          secretKey: client-secret
inventory:
  replicaCount: 1
  image:
    repository: lab02clusterregistry.azurecr.io/eurotransit/inventory
    tag: latest
    # Empty by default: standard mode resolves "latest" via restartedAt, same as
    # today's CI/CD flow. requireProgressiveDigest already fails the render if
    # this service is switched to canary/blueGreen without a real digest here -
    # populate it only at that point, not as a standing default.
    digest: ""
    pullPolicy: Always
  restartedAt: "2026-07-15T15:13:41Z-4fa375062d38ec8d6f5163ff0298d65418178ba8"
  # Re-measured 2026-07-15: actual usage steady at ~294Mi, so 400Mi/800Mi left
  # ~2.7x headroom unused on capacity-starved nodes. Trimmed to ~1.9x actual.
  # CPU untouched - the HPA's targetCPUUtilizationPercentage needs a stable
  # baseline to compute against.
  resources:
    requests:
      cpu: 250m
      memory: 340Mi
    limits:
      cpu: "1"
      memory: 550Mi
  service:
    type: ClusterIP
    port: 8080
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 60
        policies:
          - type: Pods
            value: 1
            periodSeconds: 60
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Pods
            value: 1
            periodSeconds: 120
  security:
    jwt:
      audience: inventory
payments:
  replicaCount: 1
  image:
    repository: lab02clusterregistry.azurecr.io/eurotransit/payments
    tag: latest
    # Empty by default: standard mode resolves "latest" via restartedAt, same as
    # today's CI/CD flow. requireProgressiveDigest already fails the render if
    # this service is switched to canary/blueGreen without a real digest here -
    # populate it only at that point, not as a standing default.
    digest: ""
    pullPolicy: Always
  restartedAt: "2026-07-15T15:13:49Z-4fa375062d38ec8d6f5163ff0298d65418178ba8"
  # Re-measured 2026-07-15: actual usage steady at ~251Mi, so 384Mi/768Mi left
  # ~3x headroom unused on capacity-starved nodes. Trimmed to ~1.9x actual.
  resources:
    requests:
      cpu: 100m
      memory: 300Mi
    limits:
      cpu: 500m
      memory: 480Mi
  service:
    type: ClusterIP
    port: 8080
  gateway:
    url: http://payment-gateway-sim:8080
  # Rendered into SPRING_APPLICATION_JSON. This keeps the Payments -> gateway
  # circuit-breaker policy in GitOps instead of only in the image defaults.
  springApplicationJson:
    app:
      gateway:
        timeout: 5s
        connection-pool:
          name: payments-gateway
          max-connections: 20
          pending-acquire-max-count: 50
          pending-acquire-timeout: 500ms
    resilience4j:
      bulkhead:
        instances:
          payment-gateway:
            max-concurrent-calls: 20
            max-wait-duration: 0ms
      circuitbreaker:
        instances:
          payment-gateway:
            sliding-window-type: COUNT_BASED
            sliding-window-size: 10
            minimum-number-of-calls: 5
            failure-rate-threshold: 50
            slow-call-duration-threshold: 2s
            slow-call-rate-threshold: 50
            wait-duration-in-open-state: 10s
            permitted-number-of-calls-in-half-open-state: 3
            automatic-transition-from-open-to-half-open-enabled: true
            register-health-indicator: true
  security:
    jwt:
      audience: payments
# Key deliberately matches the service/directory name (dashed): CI's rollout
# step bumps `."<service>".restartedAt` and must land on this block.
payment-gateway-sim:
  replicaCount: 1
  image:
    repository: lab02clusterregistry.azurecr.io/eurotransit/payment-gateway-sim
    tag: latest
    pullPolicy: Always
  restartedAt: "2026-07-15T15:13:49Z-4fa375062d38ec8d6f5163ff0298d65418178ba8"
  # No resources declared previously - BestEffort QoS, invisible to the
  # scheduler's placement math despite steady real usage (~216Mi). Found
  # during the 2026-07-15 end-to-end memory audit; same root cause as every
  # other fix this session.
  resources:
    requests:
      cpu: 50m
      memory: 260Mi
    limits:
      cpu: 250m
      memory: 420Mi
  service:
    type: ClusterIP
    port: 8080
  stripe:
    # false = LocalChargeGateway (declines above 500.00), no secret needed.
    # Flip to true only after the payment-gateway-sim-stripe Secret exists in
    # the cluster (key: stripe-secret-key) — with it enabled and no key the
    # pod fails fast at startup by design.
    enabled: false
    paymentMethod: pm_card_visa
notifications:
  replicaCount: 1
  image:
    repository: lab02clusterregistry.azurecr.io/eurotransit/notifications
    tag: latest
    pullPolicy: Always
  restartedAt: "2026-07-15T15:13:13Z-4fa375062d38ec8d6f5163ff0298d65418178ba8"
  # Re-measured 2026-07-15: actual usage steady at ~219Mi, so 320Mi/640Mi left
  # ~2.9x headroom unused on capacity-starved nodes. Trimmed to ~1.9x actual.
  resources:
    requests:
      cpu: 100m
      memory: 260Mi
    limits:
      cpu: 500m
      memory: 420Mi
  service:
    type: ClusterIP
    port: 8080
imagePullSecrets:
  - name: acr-secret
keycloak:
  issuerUri: https://g02.cpo2026.it/auth/realms/eurotransit
  tokenUri: http://eurotransit-keycloak-service:8080/auth/realms/eurotransit/protocol/openid-connect/token
  jwkSetUri: http://eurotransit-keycloak-service:8080/auth/realms/eurotransit/protocol/openid-connect/certs
cluster:
  # Disabled: leftover bundled single-shared-Postgres subchart from before the
  # per-service CNPG migration. Nothing references it anymore - all 5 backend
  # services use their own dedicated <service>-db CNPG cluster instead. Left
  # running it was silently holding 3 full PVCs + 3 pods for nothing, and
  # actively fighting our attempt to free capacity for orders-db/Kafka during
  # a real Azure vCPU quota shortage (polandcentral regional quota exhausted).
  enabled: false
  type: postgresql
  mode: standalone
  version:
    postgresql: "16"
  cluster:
    enableSuperuserAccess: true
    initdb:
      database: eurotransitdb
  monitoring:
    enabled: false
  instances: 1
  annotations:
    helm.sh/resource-policy: keep
  backups:
    enabled: false
