namespace: eurotransit
frontend:
  replicaCount: 1
  image:
    repository: lab02clusterregistry.azurecr.io/eurotransit/frontend
    tag: latest
    # Always, not IfNotPresent: tag is mutable ("latest"), matching the same
    # reasoning already applied to the 5 backend services.
    pullPolicy: Always
  # Bumped by CI on every push to frontend/** (see .github/workflows/ci.yaml
  # in the application repo) so the pod template hash changes and
  # Kubernetes actually rolls out the new image.
  restartedAt: "unset"
  service:
    type: ClusterIP
    port: 80
catalog:
  replicaCount: 1
  image:
    repository: lab02clusterregistry.azurecr.io/eurotransit/catalog
    tag: latest
    # Always, not IfNotPresent: tag is mutable now (CI always pushes "latest"),
    # so a cached local image under that name must never be trusted as current.
    pullPolicy: Always
  # Bumped by CI on every push to main (see .github/workflows/ci.yaml) so the
  # pod template hash changes and Kubernetes actually rolls out the new
  # image - "latest" alone never changes the Deployment spec, so nothing
  # would otherwise trigger a restart.
  restartedAt: "2026-07-12T16:50:05Z-manual-fix"
  service:
    type: ClusterIP
    port: 8080
orders:
  replicaCount: 1
  image:
    repository: lab02clusterregistry.azurecr.io/eurotransit/orders
    tag: latest
    pullPolicy: Always
  restartedAt: "2026-07-12T16:50:05Z-manual-fix"
  service:
    type: ClusterIP
    port: 8080
  # Rendered into SPRING_APPLICATION_JSON so ArgoCD owns the runtime policy for
  # Orders' synchronous downstream calls. Keep instance names aligned with the
  # application code: inventory-client and payments-client.
  springApplicationJson:
    app:
      inventory:
        connection-pool:
          name: orders-inventory
          max-connections: 20
          pending-acquire-max-count: 50
          pending-acquire-timeout: 500ms
      payments:
        connection-pool:
          name: orders-payments
          max-connections: 20
          pending-acquire-max-count: 50
          pending-acquire-timeout: 500ms
    resilience4j:
      bulkhead:
        instances:
          inventory-client:
            max-concurrent-calls: 20
            max-wait-duration: 0ms
          payments-client:
            max-concurrent-calls: 20
            max-wait-duration: 0ms
      circuitbreaker:
        instances:
          inventory-client:
            register-health-indicator: true
            sliding-window-size: 10
            failure-rate-threshold: 50
            wait-duration-in-open-state: 10s
            permitted-number-of-calls-in-half-open-state: 3
          payments-client:
            register-health-indicator: true
            sliding-window-size: 10
            failure-rate-threshold: 50
            wait-duration-in-open-state: 10s
            permitted-number-of-calls-in-half-open-state: 3
      timelimiter:
        instances:
          inventory-client:
            timeout-duration: 2s
          payments-client:
            timeout-duration: 2s
      retry:
        instances:
          inventory-client:
            max-attempts: 3
            wait-duration: 500ms
            enable-exponential-backoff: true
            exponential-backoff-multiplier: 2
            enable-randomized-wait: true
            randomized-wait-factor: 0.5
          payments-client:
            max-attempts: 3
            wait-duration: 500ms
            enable-exponential-backoff: true
            exponential-backoff-multiplier: 2
            enable-randomized-wait: true
            randomized-wait-factor: 0.5
  security:
    jwt:
      audience: orders
    serviceToken:
      inventory:
        enabled: false
        # Must match the confidential client secret configured in Keycloak.
        # Store the real value as a Kubernetes Secret/SealedSecret, not here.
        clientSecret:
          secretName: orders-service-client
          secretKey: client-secret
canary:
  orders:
    enabled: false
    host: g02.cpo2026.it
    stableWeight: 90
    canaryWeight: 10
    stableServiceName: ""
    canaryServiceName: eurotransit-orders-canary
inventory:
  replicaCount: 1
  image:
    repository: lab02clusterregistry.azurecr.io/eurotransit/inventory
    tag: latest
    pullPolicy: Always
  restartedAt: "2026-07-12T16:50:05Z-manual-fix"
  service:
    type: ClusterIP
    port: 8080
  security:
    jwt:
      audience: inventory
payments:
  replicaCount: 1
  image:
    repository: lab02clusterregistry.azurecr.io/eurotransit/payments
    tag: latest
    pullPolicy: Always
  restartedAt: "2026-07-12T16:50:05Z-manual-fix"
  service:
    type: ClusterIP
    port: 8080
  gateway:
    url: http://payment-gateway-sim:8080
    timeout: 5s
  # Rendered into SPRING_APPLICATION_JSON. This keeps the Payments -> gateway
  # circuit-breaker policy in GitOps instead of only in the image defaults.
  springApplicationJson:
    app:
      gateway:
        timeout: 5s
        connection-pool:
          name: payments-gateway
          max-connections: 20
          pending-acquire-max-count: 50
          pending-acquire-timeout: 500ms
    resilience4j:
      bulkhead:
        instances:
          payment-gateway:
            max-concurrent-calls: 20
            max-wait-duration: 0ms
      circuitbreaker:
        instances:
          payment-gateway:
            sliding-window-type: COUNT_BASED
            sliding-window-size: 10
            minimum-number-of-calls: 5
            failure-rate-threshold: 50
            slow-call-duration-threshold: 2s
            slow-call-rate-threshold: 50
            wait-duration-in-open-state: 10s
            permitted-number-of-calls-in-half-open-state: 3
            automatic-transition-from-open-to-half-open-enabled: true
            register-health-indicator: true
  security:
    jwt:
      audience: payments
notifications:
  replicaCount: 1
  image:
    repository: lab02clusterregistry.azurecr.io/eurotransit/notifications
    tag: latest
    pullPolicy: Always
  restartedAt: "2026-07-12T16:50:05Z-manual-fix"
  service:
    type: ClusterIP
    port: 8080
imagePullSecrets:
  - name: acr-secret
keycloak:
  issuerUri: https://g02.cpo2026.it/auth/realms/eurotransit
  tokenUri: http://eurotransit-keycloak-service:8080/auth/realms/eurotransit/protocol/openid-connect/token
  jwkSetUri: http://eurotransit-keycloak-service:8080/auth/realms/eurotransit/protocol/openid-connect/certs
cluster:
  # Disabled: leftover bundled single-shared-Postgres subchart from before the
  # per-service CNPG migration. Nothing references it anymore - all 5 backend
  # services use their own dedicated <service>-db CNPG cluster instead. Left
  # running it was silently holding 3 full PVCs + 3 pods for nothing, and
  # actively fighting our attempt to free capacity for orders-db/Kafka during
  # a real Azure vCPU quota shortage (polandcentral regional quota exhausted).
  enabled: false
  type: postgresql
  mode: standalone
  version:
    postgresql: "16"
  cluster:
    enableSuperuserAccess: true
    initdb:
      database: eurotransitdb
  monitoring:
    enabled: false
  instances: 1
  annotations:
    helm.sh/resource-policy: keep
  backups:
    enabled: false
