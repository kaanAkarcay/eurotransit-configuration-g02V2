grafana:
  enabled: true
  adminPassword: admin
  defaultDashboardsEnabled: true

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 512Mi

prometheus:
  enabled: true
  prometheusSpec:
    retention: 6h
    retentionSize: 1GB

    # Important for the lab: allow ServiceMonitor and PrometheusRule resources
    # outside the monitoring namespace to be discovered.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    serviceMonitorNamespaceSelector: {}
    podMonitorNamespaceSelector: {}
    ruleNamespaceSelector: {}

    # Trimmed live to 340Mi (from this chart's default 512Mi) based on
    # observed real usage - kept here so this file matches the live CR
    # instead of drifting from a kubectl patch made outside Helm.
    resources:
      requests:
        cpu: 100m
        memory: 340Mi
      limits:
        cpu: 500m
        memory: 1Gi

alertmanager:
  enabled: true
  alertmanagerSpec:
    retention: 6h
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 256Mi

prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

kube-state-metrics:
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 256Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

# AKS manages the control plane. Some control-plane endpoints are not directly
# scrapeable from the student cluster. Disabling these avoids noisy broken targets.
kubeEtcd:
  enabled: false

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

# Unlike the three above, this target isn't broken - it scrapes fine, which is
# exactly the problem: apiserver's own /metrics exposes its request/response
# histograms (apiserver_request_duration_seconds_bucket etc.) AND its internal
# etcd-client instrumentation (etcd_request_duration_seconds_bucket), together
# ~25k of the ~82k total active series measured 2026-07-16. None of it is
# app-level (the RED/SLO dashboards only scrape the 6 EuroTransit services) -
# pure control-plane overhead this project isn't graded on.
kubeApiServer:
  enabled: false

