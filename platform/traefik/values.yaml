providers:
  kubernetesIngress:
    enabled: true
    ingressClass: traefik

service:
  type: LoadBalancer
  annotations:
    # V2 clone cluster (Eurotransit-demo2): using the default Azure-assigned
    # hostname directly instead of a custom domain, specifically to avoid the
    # DNS-drift incident class documented in
    # docs/azure-public-ip-root-cause-2026-07-13.md /
    # docs/ingress-incident-report-2026-07-13.md - that incident's actual root
    # cause was Traefik's Service never being pinned to a named, persistent
    # Public IP, so AKS was free to reassign a new IP/label on reconciliation.
    # Pre-created a static Public IP up front and pinned all three annotations
    # to it so a future Service/cluster recreation can't drift.
    service.beta.kubernetes.io/azure-dns-label-name: eurotransit-demo2
    service.beta.kubernetes.io/azure-load-balancer-resource-group: MC_Eurotransit_Eurotransit-demo2_spaincentral
    service.beta.kubernetes.io/azure-pip-name: pip-traefik-eurotransit

# traefik-41.0.2's own chart templates read `log:`/`accessLog:`, not
# `logs.general`/`logs.access` - the latter is silently ignored by Helm
# (confirmed by pulling the chart locally and grepping its templates).
log:
  level: DEBUG

accessLog:
  enabled: true

# Was unset entirely (BestEffort QoS) - invisible to the scheduler's
# placement math, which is exactly what let every service including the
# ingress itself pile onto one already-full node instead of spreading out
# (see docs/ai-logs.md 2026-07-14). Sized from observed real usage (~35Mi
# idle) plus real headroom, since Traefik is the one pod that must stay
# responsive even under memory pressure elsewhere.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
