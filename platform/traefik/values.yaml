providers:
  kubernetesIngress:
    enabled: true
    ingressClass: traefik

service:
  type: LoadBalancer
  annotations:
    # "g02-entrypoint" reclaimed 2026-07-13 (see docs/ai-logs.md): the old
    # Public IP holding this label belonged to an unrelated personal Azure
    # lab subscription and was deleted, freeing it. Reusing it instead of
    # "g02-entrypoint-2026" because OVH's existing CNAME for g02.cpo2026.it
    # already targets g02-entrypoint.polandcentral.cloudapp.azure.com - this
    # is what's actually live now, no OVH-side change needed.
    service.beta.kubernetes.io/azure-load-balancer-resource-group: MC_G_06_Lab02cluster_polandcentral
    service.beta.kubernetes.io/azure-pip-name: kubernetes-a18745822eff349198a98b394c413147
    service.beta.kubernetes.io/azure-dns-label-name: g02-entrypoint

log:
  level: DEBUG

accessLog:
  enabled: true
