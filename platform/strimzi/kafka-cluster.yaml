# Kafka cluster for EuroTransit - KRaft mode (no ZooKeeper; the Kafka CRD in
# Strimzi 1.1.0 doesn't support it anymore).
#
# Applied manually, after the Strimzi operator is installed:
#   kubectl apply -f platform/strimzi/kafka-cluster.yaml
#
# Verified against the actual strimzi-kafka-operator 1.1.0 chart's bundled
# CRDs (kafka.strimzi.io/v1), not assumed from memory:
# - replicas/storage live on KafkaNodePool, not on the Kafka resource itself
# - Kafka 4.3.0 is the newest version this operator release supports
#
# Node count (3), combined controller+broker role, and 10Gi persistent-claim
# storage (no explicit storage class - cluster default) are as agreed.
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: eurotransit-pool
  namespace: kafka
  labels:
    strimzi.io/cluster: eurotransit-kafka
spec:
  replicas: 3
  roles:
    - controller
    - broker
  storage:
    type: persistent-claim
    size: 10Gi
    deleteClaim: false
  # Request raised back up from 256Mi to 700Mi (2026-07-14): real observed
  # usage per broker is consistently 630-700Mi, so the 256Mi request left
  # brokers invisible to the scheduler's placement math - the same root
  # cause behind every app service's request also being unset. That
  # mismatch is what let the scheduler keep stacking pods onto an
  # already-saturated node instead of spreading load. Limit unchanged
  # (900Mi already had real headroom above observed usage). Broker count
  # and replication factors are untouched; this does not affect durability.
  resources:
    requests:
      cpu: 100m
      memory: 650Mi
    limits:
      cpu: 750m
      memory: 900Mi
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: eurotransit-kafka
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.3.0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      # 3 replicas per topic (see kafka-topics.yaml); requiring 2 acks means
      # writes are rejected rather than accepted with only 1 copy durable -
      # the same "favor consistency over availability" choice already made
      # for Inventory's reservation model. Flag if you want this different.
      min.insync.replicas: 2
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
  entityOperator:
    topicOperator:
      # No resources declared previously - BestEffort QoS, invisible to the
      # scheduler's placement math despite steady real usage (~210Mi). Found
      # during the 2026-07-15 end-to-end memory audit; same root cause as
      # every other fix this session.
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          cpu: 250m
          memory: 400Mi
