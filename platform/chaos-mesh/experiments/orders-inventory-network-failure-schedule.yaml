# Purpose: draft Chaos Mesh experiment for tuning the Orders -> Inventory
# circuit breaker under controlled network failure.
# Hypothesis: with checkout load running, a temporary network partition from
# Orders to Inventory causes the `inventory-client` circuit breaker to record
# failures and open after the configured minimum sample size and failure-rate
# threshold are met. New affected Stage 1 calls should fail fast while the
# breaker is OPEN, without causing Orders liveness restart churn.
# Prerequisite: do not use latency-only results to tune timeout-sensitive
# thresholds until the committed Orders image actually enforces an Inventory
# timeout through @TimeLimiter or an HTTP client response timeout. The config
# repo currently declares `timeout-duration`, but the committed Orders source
# inspected on 2026-07-14 does not apply @TimeLimiter to InventoryClient.
# Metrics: resilience4j circuit-breaker state, failed/not-permitted call count,
# Orders Stage 1 error and latency rate, order terminal-state convergence,
# Inventory RED metrics, and Orders/Inventory pod restart counters.
# Rollback: keep this Schedule suspended by default; if manually unsuspended,
# set spec.suspend back to true or delete this Schedule and confirm no active
# NetworkChaos remains for `orders-inventory-network-failure`.
# Validation steps: verify Chaos Mesh is installed, verify Orders timeout
# enforcement, generate controlled checkout load, unsuspend for one controlled
# run, observe metrics/logs, then resuspend and confirm recovery.
apiVersion: chaos-mesh.org/v1alpha1
kind: Schedule
metadata:
  name: orders-inventory-network-failure
  namespace: chaos-mesh
  labels:
    app.kubernetes.io/name: chaos-experiment
    app.kubernetes.io/part-of: eurotransit
    eurotransit.io/experiment: orders-inventory-network-failure
  annotations:
    eurotransit.io/status: draft
    eurotransit.io/auto-execute: "false"
    eurotransit.io/prerequisite: "orders-inventory-timeout-enforced"
spec:
  schedule: "@every 24h"
  suspend: true
  concurrencyPolicy: Forbid
  historyLimit: 1
  type: NetworkChaos
  networkChaos:
    action: partition
    mode: all
    selector:
      namespaces:
        - eurotransit
      labelSelectors:
        app.kubernetes.io/name: orders
        app.kubernetes.io/instance: eurotransit
    direction: to
    target:
      mode: all
      selector:
        namespaces:
          - eurotransit
        labelSelectors:
          app.kubernetes.io/name: inventory
          app.kubernetes.io/instance: eurotransit
    duration: 60s
