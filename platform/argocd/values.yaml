configs:
  params:
    server.insecure: "true"

server:
  service:
    type: ClusterIP
  # V2 clone cluster (Eurotransit-demo2): not exposed publicly at all - Azure
  # only gives one hostname per Public IP (no free subdomain the way
  # argocd.g02.cpo2026.it worked off a custom DNS zone), so ArgoCD here is
  # reached via `kubectl port-forward svc/argocd-server 8080:443` instead of
  # an Ingress. Simpler, no extra cert/DNS surface for a backup/demo cluster.
  ingress:
    enabled: false
