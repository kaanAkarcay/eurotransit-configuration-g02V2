global:
  domain: argocd.g02.cpo2026.it

configs:
  params:
    server.insecure: "true"

server:
  service:
    type: ClusterIP
  ingress:
    enabled: true
    # Verified against the actual installed chart (argo-cd-10.1.3)'s own
    # template - it reads .server.ingress.ingressClassName, not .className.
    # The wrong key name was silently ignored (Helm doesn't error on unused
    # values), leaving the rendered Ingress with no ingressClassName at all.
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      traefik.ingress.kubernetes.io/router.middlewares: argocd-redirect-https@kubernetescrd
    host: argocd.g02.cpo2026.it
    tls:
      enabled: true
      secretName: argocd-server-tls
