apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-rollouts
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-rollouts
    # Chart 2.41.0 installs Argo Rollouts v1.9.0. Keep the version pinned so a
    # platform sync cannot introduce an unreviewed controller/CRD upgrade.
    targetRevision: 2.41.0
    helm:
      releaseName: argo-rollouts
      values: |
        installCRDs: true
        keepCRDs: true
        controller:
          extraArgs:
            - --traefik-api-group=traefik.io
            - --traefik-api-version=traefik.io/v1alpha1
        dashboard:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-rollouts
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
