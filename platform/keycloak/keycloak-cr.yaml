# The Keycloak server instance itself.
#
# Verified against the actual Keycloak Operator 26.7.0 CRD
# (keycloaks.k8s.keycloak.org, group k8s.keycloak.org, versions
# v2beta1/v2alpha1) - not assumed from memory:
# - db credentials are referenced via usernameSecret/passwordSecret, which
#   only resolve in this CR's own namespace (see keycloak-db-cluster.yaml)
# - there is no first-class "path prefix" field on the operator-generated
#   Ingress. Path-based routing is provided by keycloak-ingress.yaml, while
#   http-relative-path makes Keycloak generate URLs consistent with /auth.
# - bootstrapAdmin.user.secret references a Secret with username/password
#   keys; unlike CNPG, Keycloak does NOT auto-generate this - it must be
#   created and sealed separately (see the accompanying instructions)
#
# Applied manually, after keycloak-db-cluster.yaml is Ready and the admin
# credentials SealedSecret exists:
#   kubectl apply -f platform/keycloak/keycloak-cr.yaml
apiVersion: k8s.keycloak.org/v2beta1
kind: Keycloak
metadata:
  name: eurotransit-keycloak
  namespace: eurotransit
spec:
  instances: 1
  # Operator default (1700Mi request / 2Gi limit) is sized for a production
  # instance; oversized for this single-realm, low-traffic lab deployment and
  # was the single largest memory reservation in the whole cluster - explicit
  # override to fit the 3-node pool during a real vCPU quota shortage
  # (polandcentral regional quota exhausted, can't scale nodes to compensate).
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 750m
      memory: 1Gi
  db:
    vendor: postgres
    host: keycloak-db-rw.eurotransit.svc.cluster.local
    port: 5432
    database: keycloak_db
    usernameSecret:
      name: keycloak-db-app
      key: username
    passwordSecret:
      name: keycloak-db-app
      key: password
  hostname:
    # Bare hostname, not a full https:// URL: a full URL here makes Keycloak
    # treat it as the complete frontend base and drop http-relative-path
    # (verified live - issuer came back as .../realms/eurotransit, missing
    # /auth, which every backend's issuer-uri requires). The scheme instead
    # comes from proxy.headers below trusting Traefik's X-Forwarded-Proto -
    # that's also what fixes the original bug: Traefik terminates TLS and
    # forwards to Keycloak over plain HTTP internally, so without a trusted
    # proxy header Keycloak saw its own http request and minted iss: http://...
    # while every resource server validates against https://... (confirmed
    # live via the realm's discovery document before this fix).
    hostname: g02.cpo2026.it
  http:
    httpEnabled: true
  # xforwarded matches Traefik's default X-Forwarded-* headers (not the RFC
  # 7239 Forwarded header). Without this, Keycloak has no reason to trust the
  # scheme/host Traefik forwarded and falls back to what it saw directly.
  proxy:
    headers: xforwarded
  ingress:
    enabled: false
    className: traefik
  additionalOptions:
    - name: http-relative-path
      value: /auth
    # Operator default is "ispn" (Infinispan clustered cache), which starts
    # JGroups cluster-discovery machinery (JDBC_PING2, polling the DB for
    # peers) even with instances:1 - there's no second node to cluster with,
    # so it's pure overhead. "local" drops the clustering layer entirely.
    - name: cache
      value: local
    # Without this, only front-channel requests (through Traefik, with
    # X-Forwarded-Proto) get the correct https issuer above. Backchannel
    # calls that reach Keycloak directly in-cluster (e.g. Orders' own
    # client_credentials token fetch via KEYCLOAK_TOKEN_URI, which hits
    # eurotransit-keycloak-service:8080 with no proxy in front) have no
    # forwarded header, so Keycloak fell back to the raw connection's
    # scheme/port and stamped iss: http://g02.cpo2026.it:8080/... instead of
    # the public https form - every resource server then rejected that
    # service token as an invalid issuer. Confirmed live 2026-07-16 by
    # decoding a token minted via the internal token endpoint. false forces
    # backchannel responses to use the same fixed hostname as the front
    # channel regardless of how the request arrived.
    - name: hostname-backchannel-dynamic
      value: "false"
  bootstrapAdmin:
    user:
      secret: keycloak-admin-credentials
