# Declares the realm, the frontend's OIDC client, and a demo test user -
# this is what makes "Configure realm, clients, service accounts and test
# users" a git-committed, reproducible artifact instead of manual admin-UI
# clicking that only exists on whoever's cluster did it.
#
# `frontend` is a public client (no secret - it's delivered to the browser,
# so a confidential client secret would be exposed anyway) using
# Authorization Code + PKCE, the standard, secure pattern for a browser SPA.
#
# The test user's password is intentionally plaintext here, not sealed -
# it's a throwaway demo credential with no access to anything sensitive by
# itself (the whole point of pattern B is that authorization happens per-
# service via the JWT, not via this account being trusted with anything).
# Treating it the same as the DB/admin credentials would be over-engineering
# for what it actually protects.
#
# Applied manually, after keycloak-cr.yaml's Keycloak instance is Ready:
#   kubectl apply -f platform/keycloak/realm-import.yaml
#
# The `orders-service` client is a confidential service-account client. Its
# secret is intentionally not committed here. After the realm import is applied,
# set or retrieve the client secret in Keycloak and store the matching value as a
# Kubernetes Secret/SealedSecret named `orders-service-client` with key
# `client-secret`; the Orders Helm deployment references that secret.
apiVersion: k8s.keycloak.org/v2beta1
kind: KeycloakRealmImport
metadata:
  name: eurotransit-realm
  namespace: eurotransit
spec:
  keycloakCRName: eurotransit-keycloak
  # The Operator's own doc says this is "inherited from the Keycloak CR" if
  # unset, but in practice the one-off import Job still requested the
  # Operator's hardcoded 1700Mi default regardless - too large for this
  # cluster's ~1Gi/node of actually-free memory (regional vCPU/resource
  # quota is already tight, see docs/ai-logs.md). Set explicitly instead of
  # relying on inheritance.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  realm:
    realm: eurotransit
    enabled: true
    clientScopes:
      - name: orders-audience
        protocol: openid-connect
        description: Adds the Orders API audience to frontend access tokens.
        protocolMappers:
          - name: orders-audience
            protocol: openid-connect
            protocolMapper: oidc-audience-mapper
            consentRequired: false
            config:
              included.client.audience: orders
              access.token.claim: "true"
              id.token.claim: "false"
      - name: inventory-audience
        protocol: openid-connect
        description: Adds the Inventory API audience to Orders service-account tokens.
        protocolMappers:
          - name: inventory-audience
            protocol: openid-connect
            protocolMapper: oidc-audience-mapper
            consentRequired: false
            config:
              included.client.audience: inventory
              access.token.claim: "true"
              id.token.claim: "false"
      - name: payments-audience
        protocol: openid-connect
        description: Adds the Payments API audience to Orders service-account tokens.
        protocolMappers:
          - name: payments-audience
            protocol: openid-connect
            protocolMapper: oidc-audience-mapper
            consentRequired: false
            config:
              included.client.audience: payments
              access.token.claim: "true"
              id.token.claim: "false"
    clients:
      - clientId: frontend
        publicClient: true
        protocol: openid-connect
        standardFlowEnabled: true
        directAccessGrantsEnabled: false
        defaultClientScopes:
          - web-origins
          - acr
          - profile
          - roles
          - email
          - orders-audience
        redirectUris:
          - "https://g02.cpo2026.it/*"
        webOrigins:
          - "https://g02.cpo2026.it"
        attributes:
          pkce.code.challenge.method: S256
      - clientId: orders
        protocol: openid-connect
        publicClient: false
        standardFlowEnabled: false
        directAccessGrantsEnabled: false
        serviceAccountsEnabled: false
      - clientId: inventory
        protocol: openid-connect
        publicClient: false
        standardFlowEnabled: false
        directAccessGrantsEnabled: false
        serviceAccountsEnabled: false
      - clientId: payments
        protocol: openid-connect
        publicClient: false
        standardFlowEnabled: false
        directAccessGrantsEnabled: false
        serviceAccountsEnabled: false
      - clientId: orders-service
        protocol: openid-connect
        publicClient: false
        standardFlowEnabled: false
        directAccessGrantsEnabled: false
        serviceAccountsEnabled: true
        defaultClientScopes:
          - web-origins
          - acr
          - profile
          - roles
          - email
          - inventory-audience
          - payments-audience
    users:
      - username: testuser
        enabled: true
        emailVerified: true
        email: testuser@eurotransit.local
        credentials:
          - type: password
            value: "ChangeMe123!"
            temporary: false
